<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tonight NYC — NYC Comedy Lineups</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta property="og:title" content="Tonight NYC — NYC Comedy Lineups">
  <meta property="og:description" content="Every NYC comedy show, filtered your way. Mark favorites, skip regulars, book the right set.">
  <meta property="og:url" content="https://cellartonight.com">
  <meta property="og:image" content="https://cellartonight.com/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://cellartonight.com/og-image.png">
  <meta name="description" content="NYC comedy lineups from Comedy Cellar, The Stand, and more. Per-show breakdowns, favorites, skips, and direct booking.">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="stylesheet" href="style.css?v=20260326b">
  <script>
    (function() {
      const saved = localStorage.getItem('cellar-theme');
      if (saved) { document.documentElement.dataset.theme = saved; }
      else if (window.matchMedia('(prefers-color-scheme: light)').matches) {
        document.documentElement.dataset.theme = 'light';
      }
    })();
  </script>
</head>
<body>
  <header>
    <div class="header-row">
      <h1>Tonight <span class="accent">NYC</span></h1>
    </div>
    <p class="subtitle">NYC comedy lineups, filtered your way.</p>
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle light/dark mode">
      <svg class="theme-icon-svg" id="theme-icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"></circle>
        <line x1="12" y1="1" x2="12" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="23"></line>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
        <line x1="1" y1="12" x2="3" y2="12"></line>
        <line x1="21" y1="12" x2="23" y2="12"></line>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
      </svg>
      <svg class="theme-icon-svg" id="theme-icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
    </button>
  </header>

  <hr class="section-divider">

  <div class="venue-source-tabs" id="venue-source-tabs">
    <button class="venue-source-tab active" data-source="all">All Venues</button>
    <button class="venue-source-tab" data-source="cellar">Comedy Cellar</button>
    <button class="venue-source-tab" data-source="the-stand">The Stand</button>
    <button class="venue-source-tab" data-source="big-shows">Other Shows</button>
  </div>

  <nav id="day-tabs" class="day-tabs"></nav>
  <div class="venue-filters" id="venue-filters"></div>

  <div class="toolbar">
    <button class="settings-btn" id="open-settings">My Comedians</button>
    <label class="toggle toolbar-toggle">
      <input type="checkbox" id="picture-mode">
      <span>Big Pictures</span>
    </label>
    <div class="toolbar-spacer"></div>
    <select id="time-filter" class="time-select">
      <option value="any">Latest start</option>
      <option value="19:00">By 7pm</option>
      <option value="20:00">By 8pm</option>
      <option value="21:00">By 9pm</option>
      <option value="22:00">By 10pm</option>
      <option value="23:00">By 11pm</option>
    </select>
    <button class="toolbar-btn" id="filters-toggle">Filters ▾</button>
  </div>

  <div class="filters-panel" id="filters-panel" style="display:none;">
    <div class="filters-grid">
      <label class="quick-mode-toggle" id="quick-mode-label">
        <input type="checkbox" id="quick-mode">
        <span class="quick-mode-switch"></span>
        <span class="quick-mode-text">Ratings mode</span>
        <span class="info-icon" onclick="event.preventDefault();">&#9432;
          <span class="info-popup">With Ratings mode ON, click comedians to cycle: Fave → Skip → Neutral. With it OFF, click to expand their bio.</span>
        </span>
      </label>
      <label class="toggle" id="only-faves-label">
        <input type="checkbox" id="only-faves">
        <span>Faves only</span>
      </label>
      <label class="toggle">
        <input type="checkbox" id="hide-skips">
        <span>Hide skips</span>
      </label>
      <label class="toggle">
        <input type="checkbox" id="expand-bios">
        <span>Short bios</span>
      </label>
      <label class="toggle">
        <input type="checkbox" id="expand-long-bios">
        <span>Long bios</span>
      </label>
      <label class="toggle">
        <input type="checkbox" id="no-photo-filter">
        <span>No photo</span>
      </label>
      <select id="sort-select" class="sort-select">
        <option value="none">Sort by...</option>
        <option value="faves"># of faves</option>
      </select>
      <button class="reset-filters-btn" id="reset-filters" style="display:none;">Reset all</button>
    </div>
  </div>

  <main id="shows-container" class="shows-container">
    <div class="loading" id="loading">Loading lineups...</div>
  </main>

  <!-- Settings Modal -->
  <div class="modal-overlay hidden" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2>My Comedians</h2>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <p class="modal-desc">Tap a name to cycle: <span class="chip-demo fav">Fave</span> &rarr; <span class="chip-demo skip">Skip</span> &rarr; <span class="chip-demo neutral">Neutral</span></p>
      <div class="modal-search-wrap">
        <input type="text" id="comedian-search" placeholder="Search comedians..." class="modal-search">
      </div>
      <div class="modal-sections">
        <div class="modal-section">
          <div id="all-list" class="chip-list"></div>
        </div>
        <div class="modal-section">
          <h3>Your Favorites <span class="count" id="fav-count"></span></h3>
          <div id="fav-list" class="chip-list"></div>
        </div>
        <div class="modal-section">
          <h3>Your Skips <span class="count" id="skip-count"></span></h3>
          <div id="skip-list" class="chip-list"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-reset" id="reset-prefs">Reset All</button>
        <button class="btn-share" id="share-link">Copy Share Link</button>
        <button class="btn-done" id="modal-done">Done</button>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <div id="footer-venue-info"></div>
    <p>Built by fans, for fans.</p>
    <p><a href="mailto:whos@cellartonight.com">whos@cellartonight.com</a></p>
  </footer>

  <script src="app.js?v=20260326b"></script>
  <!-- Vercel Web Analytics — auto-injected when enabled in dashboard -->
  <script defer src="/_vercel/insights/script.js"></script>
  <!-- Vercel Speed Insights -->
  <script defer src="/_vercel/speed-insights/script.js"></script>
</body>
</html>
