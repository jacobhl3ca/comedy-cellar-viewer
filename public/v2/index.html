<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cellar Tonight v2 — Card Layout Test</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="stylesheet" href="../style.css">
  <script>
    (function() {
      const saved = localStorage.getItem('cellar-theme');
      if (saved) { document.documentElement.dataset.theme = saved; }
      else if (window.matchMedia('(prefers-color-scheme: light)').matches) {
        document.documentElement.dataset.theme = 'light';
      }
    })();
  </script>
  <style>
    /* v2 overrides: card-based comedian layout */
    .show-lineup {
      display: grid !important;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px !important;
      padding: 14px 16px !important;
    }
    .comedian {
      flex-direction: column !important;
      align-items: center !important;
      padding: 12px 8px !important;
      text-align: center;
      border-radius: 10px !important;
      gap: 6px !important;
      min-height: 90px;
      justify-content: center;
    }
    .comedian-photo {
      width: 56px !important;
      height: 56px !important;
      margin-right: 0 !important;
      margin-bottom: 4px;
    }
    .comedian .star {
      position: absolute;
      top: 4px;
      right: 4px;
      margin: 0 !important;
    }
    .comedian {
      position: relative;
    }
    .comedian-name {
      font-size: 12px;
      line-height: 1.2;
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .comedian-tagline {
      font-size: 10px;
      color: var(--text-dim);
      line-height: 1.2;
      max-height: 2.4em;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .comedian.fav { border-width: 2px; }
    .comedian.new-face { border-width: 1px; }

    .v2-banner {
      background: var(--surface2); border: 1px solid var(--gold); border-radius: 8px;
      padding: 10px 16px; margin-bottom: 12px; font-size: 13px; color: var(--text-dim);
      text-align: center;
    }
    .v2-banner a { color: var(--accent); }

    @media (max-width: 480px) {
      .show-lineup { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)) !important; }
      .comedian-photo { width: 44px !important; height: 44px !important; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-row">
      <h1>Cellar <span class="accent">Tonight</span> <span style="font-size:14px;color:var(--text-dim);">v2</span></h1>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle light/dark mode">
        <span class="theme-icon" id="theme-icon"></span>
      </button>
    </div>
    <p class="subtitle">Card layout test — comedian photos + taglines visible.</p>
  </header>

  <nav id="day-tabs" class="day-tabs"></nav>

  <div class="controls">
    <label class="toggle">
      <input type="checkbox" id="hide-skips">
      <span>Hide my skips</span>
    </label>
    <label class="toggle">
      <input type="checkbox" id="only-favs">
      <span>Only sets with favs</span>
    </label>
    <label class="toggle">
      <input type="checkbox" id="show-photos" checked>
      <span>Photos</span>
    </label>
    <button class="settings-btn" id="open-settings">My Comedians</button>
  </div>

  <div class="v2-banner">Testing card layout. <a href="/">Back to v1 (chips)</a></div>

  <main id="shows-container" class="shows-container">
    <div class="loading" id="loading">Loading lineups...</div>
  </main>

  <div class="modal-overlay hidden" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2>My Comedians</h2>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <p class="modal-desc">Tap a name to cycle: <span class="chip-demo fav">Fav</span> &rarr; <span class="chip-demo skip">Skip</span> &rarr; <span class="chip-demo neutral">Neutral</span></p>
      <div class="modal-search-wrap">
        <input type="text" id="comedian-search" placeholder="Search comedians..." class="modal-search">
      </div>
      <div class="modal-sections">
        <div class="modal-section">
          <h3>Your Favorites <span class="count" id="fav-count"></span></h3>
          <div id="fav-list" class="chip-list"></div>
        </div>
        <div class="modal-section">
          <h3>Your Skips <span class="count" id="skip-count"></span></h3>
          <div id="skip-list" class="chip-list"></div>
        </div>
        <div class="modal-section">
          <h3>All This Week</h3>
          <div id="all-list" class="chip-list"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-reset" id="reset-prefs">Reset All</button>
        <button class="btn-share" id="share-link">Copy Share Link</button>
        <button class="btn-done" id="modal-done">Done</button>
      </div>
    </div>
  </div>

  <script>
    // Override comedian rendering for v2: show tagline text below name
    window.V2_MODE = true;
  </script>
  <script src="../app.js"></script>
</body>
</html>
