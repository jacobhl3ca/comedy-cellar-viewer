name: Nightly Prebake

on:
  schedule:
    - cron: '0 7 * * *'   # 3am ET year-round (7am UTC; 3am EDT / 2am EST)
    - cron: '0 22 * * *'  # 6pm ET year-round (22 UTC; 6pm EDT / 5pm EST)
  workflow_dispatch: {}   # manual trigger from GitHub UI

permissions:
  contents: write
  issues: write   # for the failure-alert step below

jobs:
  prebake:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run prebake script
        env:
          SEATGEEK_CLIENT_ID: ${{ secrets.SEATGEEK_CLIENT_ID }}
          TM_API_KEY: ${{ secrets.TM_API_KEY }}
        run: node scripts/prebake.js

      - name: Check for changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "Jacob HL"
          git config user.email "jacobhl3ca@gmail.com"
          git add public/photos/ public/data/
          git commit -m "Prebake: nightly photo + bio update [$(date -u +%Y-%m-%d)]"
          # Retry push up to 3 times (transient 403s from GitHub token)
          for i in 1 2 3; do
            git push && break
            echo "Push attempt $i failed, retrying in 10s..."
            sleep 10
          done

      # Real-failure alert — only runs if a step above actually FAILED. A job
      # that never gets a runner runs zero steps, so GitHub-infra blips stay
      # silent here (lets native Actions emails stay muted). De-dupes onto one
      # open issue so a sustained problem = one @-mention email.
      - name: Alert on real failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          title="tonightnyc nightly prebake is failing"
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          stamp="$(date -u '+%Y-%m-%d %H:%M UTC')"
          existing="$(gh issue list --state open --search "$title in:title" --json number --jq '.[0].number // empty')"
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "Still failing as of $stamp — $run_url"
          else
            gh issue create --title "🔴 $title" \
              --body "$(printf 'The nightly prebake (Comedy Cellar lineups + photos) ran and **failed** — the site may serve stale data. Not a GitHub runner blip.\n\nFirst seen: %s\nRun log: %s\n\ncc @jacobhl3ca' "$stamp" "$run_url")"
          fi
